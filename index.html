<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wireframe Canvas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%; overflow: hidden;
  background: #fff; color: #0a0a0a;
  font-family: 'Geist', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 14px; user-select: none;
  display: flex; flex-direction: column;
}

/* ── HEADER ── */
#tab-bar {
  min-height: 60px; height: 60px;
  background: #fff; border-bottom: 1px solid #c6c6c6;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 12px; gap: 12px; z-index: 200; flex-shrink: 0;
}
#header-left { display: flex; align-items: center; gap: 8px; }
#header-right { display: flex; align-items: center; gap: 8px; }

.tab-btn {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 16px; min-height: 36px;
  background: #f5f5f5; border: none; border-radius: 8px;
  color: #171717; font-size: 14px; font-weight: 500;
  cursor: pointer; transition: background 0.12s; font-family: inherit;
  white-space: nowrap;
}
.tab-btn:hover:not(.active) { background: #e5e5e5; }
.tab-btn.active { background: #171717; color: #fafafa; }
.tab-btn svg { flex-shrink: 0; }

.api-key-label { font-size: 14px; font-weight: 500; color: #0a0a0a; white-space: nowrap; }

#api-key-input {
  background: #fff; border: 1px solid #e5e5e5; border-radius: 8px;
  min-height: 36px; padding: 7px 12px;
  font-size: 12px; color: #0a0a0a; width: 260px; outline: none;
  font-family: 'SF Mono', 'Monaco', 'Menlo', monospace;
  transition: border-color 0.15s;
}
#api-key-input:focus { border-color: #2563eb; }
#api-key-input::placeholder { color: #c6c6c6; font-family: inherit; letter-spacing: 0; }

#api-key-toggle {
  width: 36px; height: 36px; flex-shrink: 0;
  background: #f5f5f5; border: none; border-radius: 8px; padding: 8px;
  color: #171717; cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: background 0.12s;
}
#api-key-toggle:hover { background: #e5e5e5; }
#api-key-toggle svg { pointer-events: none; }

#api-key-status { font-size: 11px; white-space: nowrap; }
#api-key-status.ok  { color: #16a34a; }
#api-key-status.err { color: #dc2626; }

#theme-toggle {
  display: flex; align-items: center; justify-content: center;
  width: 36px; height: 36px; flex-shrink: 0;
  background: #f5f5f5; border: none; border-radius: 8px;
  color: #171717; cursor: pointer; transition: background 0.12s;
}
#theme-toggle:hover { background: #e5e5e5; }

/* ── CANVAS ── */
#tab-panels { flex: 1; min-height: 0; position: relative; }
#tab-canvas { position: absolute; inset: 0; display: flex; }

/* Left panel — SVG Library */
#left-panel {
  width: 220px; min-width: 220px;
  background: #fff; border-right: 1px solid #c6c6c6;
  display: flex; flex-direction: column; overflow: hidden;
}
#left-panel-header {
  padding: 12px; border-bottom: 1px solid #e5e5e5;
  display: flex; flex-direction: column; gap: 10px; flex-shrink: 0;
}
.panel-label { font-size: 14px; font-weight: 600; color: #0a0a0a; line-height: 20px; }

#upload-svgs-btn {
  width: 100%; background: #fff; border: 1px solid #e5e5e5; border-radius: 8px;
  padding: 8px 12px; font-size: 14px; font-weight: 500; color: #0a0a0a;
  cursor: pointer; display: flex; align-items: center; gap: 8px;
  font-family: inherit; transition: background 0.12s;
}
#upload-svgs-btn:hover { background: #f5f5f5; }
#upload-svgs-btn svg { flex-shrink: 0; }

#svg-library-list {
  flex: 1; overflow-y: auto; background: #f5f5f5;
  padding: 8px; display: flex; flex-wrap: wrap;
  gap: 8px; align-content: flex-start;
}
#svg-library-list::-webkit-scrollbar { width: 4px; }
#svg-library-list::-webkit-scrollbar-track { background: transparent; }
#svg-library-list::-webkit-scrollbar-thumb { background: #d4d4d4; border-radius: 2px; }

.svg-lib-item {
  background: #fff; border: 1px solid #e5e5e5; border-radius: 8px;
  padding: 8px; cursor: grab; display: flex; flex-direction: column;
  align-items: center; gap: 4px; width: 86px; position: relative;
  transition: border-color 0.12s;
}
.svg-lib-item:hover { border-color: #2563eb; }
.svg-lib-item.dragging { opacity: 0.4; }
.svg-lib-preview { width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; }
.svg-lib-preview svg { max-width: 100%; max-height: 48px; pointer-events: none; }
.svg-lib-name {
  font-size: 10px; font-weight: 500; color: #737373;
  text-align: center; width: 100%;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.svg-lib-delete {
  position: absolute; top: 3px; right: 3px;
  width: 16px; height: 16px; border: none; border-radius: 4px;
  background: #f5f5f5; color: #737373;
  font-size: 11px; cursor: pointer; display: none;
  align-items: center; justify-content: center;
}
.svg-lib-item:hover .svg-lib-delete { display: flex; }
.svg-lib-delete:hover { background: #fee2e2; color: #dc2626; }
.svg-lib-empty { color: #a3a3a3; font-size: 12px; line-height: 1.6; text-align: center; padding: 24px 12px; width: 100%; }

/* Canvas area */
#canvas-area {
  flex: 1; display: flex; flex-direction: column;
  position: relative; overflow: hidden; background: #f4f4f4;
}
#canvas-viewport {
  flex: 1; position: relative; overflow: hidden; background-color: #f4f4f4;
}
#canvas-viewport.drag-over { outline: 2px dashed #2563eb; outline-offset: -2px; }
#canvas-world { position: absolute; }

.canvas-element { position: absolute; }
.canvas-element.rect-el   { background: transparent; border: 2px solid #171717; border-radius: 4px; }
.canvas-element.circle-el { background: transparent; border: 2px solid #171717; border-radius: 50%; }
.canvas-element.svg-el    { background: transparent; overflow: visible; }
.canvas-element.svg-el svg { width: 100%; height: 100%; display: block; }
.frame-label {
  position: absolute; top: 3px; right: 5px;
  font-size: 9px; font-weight: 700; line-height: 1;
  color: #171717; opacity: 0.35; pointer-events: none;
  font-family: 'Geist', -apple-system, sans-serif; letter-spacing: 0.04em;
}
body.dark-mode .frame-label { color: #e0e0e0; }

#selection-overlay {
  position: absolute; border: 1.5px solid #2563eb; border-radius: 2px;
  display: none; pointer-events: none;
}
.resize-handle {
  position: absolute; width: 8px; height: 8px;
  background: #fff; border: 1.5px solid #2563eb; border-radius: 2px; pointer-events: all;
}
.resize-handle[data-handle=nw] { cursor: nwse-resize; top: -4px; left: -4px; }
.resize-handle[data-handle=n]  { cursor: ns-resize;   top: -4px; left: calc(50% - 4px); }
.resize-handle[data-handle=ne] { cursor: nesw-resize; top: -4px; right: -4px; }
.resize-handle[data-handle=e]  { cursor: ew-resize;   top: calc(50% - 4px); right: -4px; }
.resize-handle[data-handle=se] { cursor: nwse-resize; bottom: -4px; right: -4px; }
.resize-handle[data-handle=s]  { cursor: ns-resize;   bottom: -4px; left: calc(50% - 4px); }
.resize-handle[data-handle=sw] { cursor: nesw-resize; bottom: -4px; left: -4px; }
.resize-handle[data-handle=w]  { cursor: ew-resize;   top: calc(50% - 4px); left: -4px; }

#draw-preview { position: absolute; background: transparent; display: none; pointer-events: none; }
#draw-preview.rect-preview   { border: 2px solid rgba(37,99,235,.8); border-radius: 4px; background: rgba(37,99,235,.06); }
#draw-preview.circle-preview { border: 2px solid rgba(37,99,235,.8); border-radius: 50%; background: rgba(37,99,235,.06); }

#zoom-indicator {
  position: absolute; top: 12px; left: 12px;
  background: #f5f5f5; padding: 2px 8px; border-radius: 8px;
  font-size: 12px; font-weight: 600; color: #171717;
  pointer-events: none; z-index: 10;
}

/* Control island */
#control-island {
  position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: #fff; border-radius: 10px; padding: 4px;
  display: flex; align-items: center; gap: 2px; z-index: 10;
  box-shadow: 0px 7px 2px rgba(0,0,0,0), 0px 5px 2px rgba(0,0,0,.01),
              0px 3px 2px rgba(0,0,0,.03), 0px 1px 1px rgba(0,0,0,.04),
              0px 0px 1px rgba(0,0,0,.05);
}
.tool-btn {
  width: 36px; height: 36px; background: #f5f5f5; border: none; border-radius: 8px;
  padding: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  color: #171717; transition: background 0.12s; position: relative;
}
.tool-btn:hover { background: #e5e5e5; }
.tool-btn.active { background: #2563eb; color: #fff; }
.tool-btn svg { pointer-events: none; }

.tool-btn-tooltip {
  position: absolute; bottom: calc(100% + 7px); left: 50%;
  transform: translateX(-50%);
  background: #171717; color: #fafafa;
  font-size: 11px; padding: 3px 7px; border-radius: 5px;
  white-space: nowrap; pointer-events: none;
  opacity: 0; transition: opacity 0.15s;
}
.tool-btn:hover .tool-btn-tooltip { opacity: 1; }

.island-sep { width: 1px; height: 26px; background: #e5e5e5; margin: 0 4px; flex-shrink: 0; }

#wf-send-btn {
  background: #171717; border: none; border-radius: 8px;
  padding: 8px 16px; min-height: 36px;
  color: #fafafa; font-size: 14px; font-weight: 500;
  cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
  font-family: inherit; white-space: nowrap; transition: background 0.12s;
}
#wf-send-btn:hover { background: #262626; }
#wf-send-btn:disabled { background: #e5e5e5; color: #a3a3a3; cursor: default; }

/* Right panel — Layers + Notes */
#right-panel {
  width: 240px; min-width: 240px; background: #fff;
  border-left: 1px solid #c6c6c6;
  display: flex; flex-direction: column; overflow: hidden;
}

#layers-pane {
  flex: 1; display: flex; flex-direction: column;
  border-bottom: 1px solid #c6c6c6; overflow: hidden; min-height: 0;
}
#layers-pane-header {
  padding: 12px 12px 8px; display: flex; align-items: center;
  justify-content: space-between; flex-shrink: 0;
}
#layers-list {
  flex: 1; overflow-y: auto; padding: 4px; min-height: 0;
}
#layers-list::-webkit-scrollbar { width: 4px; }
#layers-list::-webkit-scrollbar-track { background: transparent; }
#layers-list::-webkit-scrollbar-thumb { background: #d4d4d4; border-radius: 2px; }

.layer-item {
  display: flex; align-items: center; gap: 6px;
  height: 28px; padding: 0 8px; cursor: pointer;
  font-size: 12px; color: #525252; border-radius: 6px;
  transition: background 0.1s, color 0.1s;
}
.layer-item:hover { background: #f5f5f5; color: #0a0a0a; }
.layer-item.selected { background: rgba(37,99,235,0.1); color: #0a0a0a; }
.layer-icon { font-size: 9px; color: #a3a3a3; flex-shrink: 0; width: 14px; text-align: center; }
.layer-item.selected .layer-icon { color: #2563eb; }
.layer-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.layers-empty { padding: 12px; font-size: 12px; color: #a3a3a3; line-height: 1.6; text-align: center; }



/* Notes pane */
#notes-pane {
  flex: 1; display: flex; flex-direction: column;
  padding: 12px; gap: 8px; min-height: 0;
}
#notes-textarea {
  flex: 1; background: #fff; border: 1px solid #e5e5e5; border-radius: 8px;
  padding: 8px 12px; font-size: 13px; color: #0a0a0a;
  resize: none; outline: none; font-family: inherit; line-height: 1.5;
  transition: border-color 0.15s; min-height: 0;
}
#notes-textarea:focus { border-color: #2563eb; }
#notes-textarea::placeholder { color: #a3a3a3; }


@keyframes spin { to { transform: rotate(360deg); } }

#download-code-btn {
  background: #16a34a; border: none; border-radius: 8px;
  padding: 8px 16px; min-height: 36px;
  color: #fafafa; font-size: 14px; font-weight: 500;
  cursor: pointer; display: flex; align-items: center; gap: 8px;
  font-family: inherit; white-space: nowrap; transition: background 0.12s;
}
#download-code-btn:hover { background: #15803d; }
#download-code-btn svg { flex-shrink: 0; }
#download-code-badge {
  background: rgba(255,255,255,0.25); color: #fff; font-size: 9px; font-weight: 700;
  min-width: 16px; height: 16px; border-radius: 8px; padding: 0 4px;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}

/* ── TOAST ── */
#toast {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(12px);
  background: #171717; color: #fafafa;
  padding: 8px 18px; border-radius: 8px; font-size: 13px; z-index: 1000;
  opacity: 0; transition: opacity 0.2s, transform 0.2s; pointer-events: none;
  box-shadow: 0 4px 16px rgba(0,0,0,0.15);
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── DARK MODE ── */
body.dark-mode { background: #141414; color: #e0e0e0; }
body.dark-mode #tab-bar { background: #161616; border-bottom-color: #2a2a2a; }
body.dark-mode .tab-btn { background: #252525; color: #e0e0e0; }
body.dark-mode .tab-btn:hover:not(.active) { background: #2e2e2e; }
body.dark-mode .tab-btn.active { background: #fafafa; color: #171717; }
body.dark-mode .api-key-label { color: #e0e0e0; }
body.dark-mode #api-key-input { background: #252525; border-color: #3a3a3a; color: #e0e0e0; }
body.dark-mode #api-key-input::placeholder { color: #555; }
body.dark-mode #api-key-toggle { background: #252525; color: #999; }
body.dark-mode #api-key-toggle:hover { background: #2e2e2e; color: #e0e0e0; }
body.dark-mode #theme-toggle { background: #252525; color: #999; }
body.dark-mode #theme-toggle:hover { background: #2e2e2e; color: #e0e0e0; }
body.dark-mode #left-panel { background: #1f1f1f; border-right-color: #2e2e2e; }
body.dark-mode #left-panel-header { border-bottom-color: #2e2e2e; }
body.dark-mode .panel-label { color: #e0e0e0; }
body.dark-mode #upload-svgs-btn { background: #252525; border-color: #3a3a3a; color: #e0e0e0; }
body.dark-mode #upload-svgs-btn:hover { background: #2e2e2e; }
body.dark-mode #svg-library-list { background: #1a1a1a; }
body.dark-mode #svg-library-list::-webkit-scrollbar-thumb { background: #3a3a3a; }
body.dark-mode .svg-lib-item { background: #252525; border-color: #3a3a3a; }
body.dark-mode .svg-lib-item:hover { border-color: #4f46e5; }
body.dark-mode .svg-lib-name { color: #999; }
body.dark-mode .svg-lib-delete { background: #3a3a3a; color: #888; }
body.dark-mode .svg-lib-delete:hover { background: #4a3030; color: #e06060; }
body.dark-mode .svg-lib-empty { color: #484848; }
body.dark-mode #canvas-area,
body.dark-mode #canvas-viewport { background-color: #1a1a1a; }
body.dark-mode #canvas-viewport.drag-over { outline-color: #4f46e5; }
body.dark-mode .canvas-element.rect-el,
body.dark-mode .canvas-element.circle-el { border-color: #e0e0e0; }
body.dark-mode #zoom-indicator { background: #252525; color: #e0e0e0; }
body.dark-mode #control-island { background: #252525; }
body.dark-mode .tool-btn { background: #1f1f1f; color: #777; }
body.dark-mode .tool-btn:hover { background: #333; color: #e0e0e0; }
body.dark-mode .tool-btn.active { background: #4f46e5; color: #fff; }
body.dark-mode .tool-btn-tooltip { background: #333; color: #e0e0e0; }
body.dark-mode .island-sep { background: #3a3a3a; }
body.dark-mode #wf-send-btn { background: #4f46e5; }
body.dark-mode #wf-send-btn:hover { background: #4338ca; }
body.dark-mode #wf-send-btn:disabled { background: #2e2e2e; color: #555; }
body.dark-mode #right-panel { background: #1f1f1f; border-left-color: #2e2e2e; }
body.dark-mode #layers-pane { border-bottom-color: #2e2e2e; }
body.dark-mode #layers-list::-webkit-scrollbar-thumb { background: #3a3a3a; }
body.dark-mode .layer-item { color: #777; }
body.dark-mode .layer-item:hover { background: #252525; color: #e0e0e0; }
body.dark-mode .layer-item.selected { background: rgba(79,70,229,0.15); }
body.dark-mode .layer-icon { color: #444; }
body.dark-mode .layer-item.selected .layer-icon { color: #6366f1; }
body.dark-mode .layers-empty { color: #3a3a3a; }
body.dark-mode #notes-pane .panel-label { color: #e0e0e0; }
body.dark-mode #notes-textarea { background: #252525; border-color: #333; color: #e0e0e0; }
body.dark-mode #notes-textarea::placeholder { color: #444; }
body.dark-mode #download-code-btn { background: #16a34a; }
body.dark-mode #download-code-btn:hover { background: #15803d; }
body.dark-mode #toast { background: #2a2a2a; border: 1px solid #3a3a3a; }
</style>
<script type="text/plain" id="system-prompt">
You are a Carbon Design System expert and React developer embedded in a wireframing tool.
The user has drawn a wireframe. Your primary job is to implement it faithfully as production-ready IBM Carbon + React code.

Always cross-check props and structure against the official Carbon docs (https://carbondesignsystem.com) before finalizing output. When unsure, align with documented patterns.

━━━ HOW YOU WORK ━━━

The wireframe is your source of truth for layout and components. Read it carefully before responding.

 WHAT THE WIREFRAME ALREADY TELLS YOU — do NOT ask about these:
 • Layout structure (which frames are side-by-side vs. stacked)
 • Which components to use (SVG labels name them explicitly)
 • Visual hierarchy (size and position of shapes)
 • Navigation structure (Header, SideNav, Tabs are named)
  • Component multiplicity: every instance on canvas (even if labels repeat) is a separate element you must render. Do NOT merge duplicate labels into one component.

WHAT YOU SHOULD ASK ABOUT — things the wireframe cannot show:
  • Purpose / context: what does this screen do? who uses it?
  • Data: what real data populates each table/list? how many rows typically?
  • Key interactions: what happens when the user clicks X? does Y open a modal or navigate?
  • States: are there empty states, loading states, or error states to handle?

━━━ GENERATION RULES ━━━

 1. Look at the wireframe first. Identify every shape and SVG label.
 2. Generate the code immediately. Do NOT ask any questions. Do NOT ask for clarification.
 3. Make reasonable assumptions for anything not shown (labels, data, copy). State them briefly in a comment at the top of App.jsx.
 4. Do NOT ask permission to start coding. Do NOT summarize before coding. Just build it.
 5. Instance fidelity: if the component list says "Data table ×2" or the layout shows two tables, render two distinct DataTable components, each in its own container. Buttons, searches, pagination, etc. must also match the counts shown.
 6. Sibling layout fidelity: if siblings share a Row Frame, keep them in the same horizontal flex row in code; do NOT move a search bar below tabs if they are siblings.
  7. Respect containment + order: never relocate a child to a different parent. Within a Row Frame, render children left→right according to their canvas x-position. Within a Column Frame, render top→bottom. Do not float or wrap items to a new line unless the canvas shows a wrap.

━━━ VIEWPORT & LAYOUT — NON-NEGOTIABLE ━━━

Every generated app MUST fill the full browser viewport with no orphaned empty space:

  1. Root & body MUST have: height: 100%; margin: 0; in index.css. Content must visually fill the viewport beneath the header (no dead whitespace).
  2. Always wrap the app in the Carbon shell:
       <Header> at the top
       <Content> fills the remaining height (Carbon handles this automatically via .cds--content)
       Optionally <SideNav> when the wireframe shows a sidebar
  3. Inside <Content>, the layout div must stretch:
       style={{ display: 'flex', flexDirection: 'column', height: '100%' }}
4. Side-by-side panels (Row Frames): use a flex row with flex: 1 on each panel so they
    share the full width and stretch to the content height. Never use fixed pixel widths for panels.
5. DataTables and lists fill their container: use style={{ width: '100%' }} on TableContainer.
6. Avoid any layout where more than ~15% of the viewport below the header is empty grey/white.
8. If your content height is shorter than the viewport, wrap main content in a flex column with minHeight:'calc(100vh - 48px)' (or equivalent) and give major sections flex:1 so the page stretches to the bottom.
9. Row Frames must render as `display:flex; gap:16px; align-items:stretch;` with each child `flex:1` unless the canvas shows a narrow rail. Align top edges and keep equal heights when siblings are peers.
10. Buttons/tags/icon buttons are hug-content by default (natural width). In toolbars, keep them inline with inputs, vertically centered, and do not stretch them to fill a column.
  7. If there is NO header in the wireframe, still wrap content in a div with
     style={{ minHeight: '100vh', display: 'flex', flexDirection: 'column' }} so the page fills the screen.

━━━ DATA DENSITY ━━━

  • Populate every table/list with at minimum 5–8 realistic placeholder rows.
  • Use meaningful column names and plausible domain-appropriate data — NOT "Row 1", "Item A", "Value".
  • If the wireframe shows a data table for users → use real-looking names, emails, roles, statuses.
  • If it shows a product list → use product names, SKUs, prices, quantities.
  • If it shows a pipeline/job list → use job IDs, stages, timestamps, statuses.
  • Match the data to what the designer notes suggest; if notes are silent, infer from component names.

━━━ CARBON DESIGN GUIDELINES ━━━

── Spacing ──
  Carbon uses an 8px base grid. Use the Stack component with gap prop for vertical rhythm.
  Dense UIs (dashboards, data tools): sm size variants. Consumer-facing: md/lg.

── Theming ──
  g100/g90: internal tools, dashboards, developer tools.
  g10/white: content-focused, consumer-facing UIs.
  Default to g100 unless the user specifies otherwise.

── Accessibility ──
  Icon-only buttons REQUIRE iconDescription prop.
  Form fields must have labelText (never placeholder-only).
  Every interactive element needs a visible label or aria-label.

── Component rules ──
  ONE primary button per section.
  Do NOT use Toast for errors — use InlineNotification (persists until resolved).
  Do NOT use Modal for workflows with more than 5 fields — use a full page or SidePanel.
  Do NOT use Tabs if content in each tab is drastically different — consider separate pages.

━━━ CODE GENERATION RULES ━━━

── SYNTAX — THESE ARE HARD RULES, NEVER BREAK THEM ──

  Every file you output must be 100% syntactically valid. A file with a syntax error is worse than no file.

  JSX rules:
  - Every opening tag must have a matching closing tag or be self-closed: <Tag /> or <Tag>...</Tag>
  - Use className, not class. Use htmlFor, not for. Event handlers are camelCase: onClick, onChange, onSubmit.
  - JSX expressions inside {} must be valid JS — no dangling commas, no half-written expressions.
  - Ternaries must be complete: {condition ? <A /> : <B />} — never leave the false branch missing.
  - When mapping arrays: {items.map(item => (<Tag key={item.id}>...</Tag>))} — key prop always required.

  Import rules:
  - Every component, hook, and icon used in a file must be imported at the top of that file.
  - Never reference a component that isn't imported. Never leave import { ... } with a missing name.
  - Imports from '@carbon/react' and '@carbon/icons-react' must list every symbol used — no wildcards.

  Completeness rules:
  - Never truncate. Never write "// ... rest of component", "// TODO", or any placeholder.
  - Every file must be complete, starting from the first line to the last closing brace/tag.
  - useState, useEffect, and other hooks must be fully initialized — no `const [x] = useState()` without a default.
  - Props passed to a component must exist on that component. Don't invent props.

  File output format:
  - Output each file as: the filename on its own line (e.g. `src/App.jsx`), then a fenced code block.
  - Fence language must match: ```jsx for JSX files, ```js for JS, ```json for JSON, ```css for CSS.
  - Do not nest code blocks inside each other.

── FILE STRUCTURE — MANDATORY, NO EXCEPTIONS ──

  NEVER put everything in one file. ALWAYS split into:

  src/index.jsx       — entry point only: ReactDOM.createRoot + import App + import index.css
  src/index.css       — @import '@carbon/styles/css/styles.css'; + any global overrides
  src/App.jsx         — root layout: wraps in <Theme>, composes top-level shell (Header, SideNav, Content)
  src/components/     — one file per logical UI section or reusable component
    e.g. src/components/Dashboard.jsx, src/components/UserTable.jsx, src/components/Sidebar.jsx

  Rules:
  • App.jsx imports and assembles the components — it does NOT contain inline JSX for every detail
  • Each component file is self-contained: its own imports, its own state, its own props
  • index.css contains ONLY the Carbon import + minimal global resets — no component styles inline
  • If a component needs custom styles, put them in a sibling .css file (e.g. Dashboard.css) and import it

When reading a wireframe, map each shape to the most appropriate Carbon component.
Rectangle near top = likely Header or Tile. SVG labels identify specific components directly.
Always output full file contents with every import. Never abbreviate with "// ... rest of component".
Output each file as: the filename on its own line (e.g. src/App.jsx), then a fenced code block.

 ━━━ WIREFRAME FIDELITY — NON-NEGOTIABLE ━━━

The first user message will always contain the CURRENT WIREFRAME STATE and a COMPONENT LIST.
Before writing a single line of code you MUST:
  1. Read the wireframe and identify every component listed.
  2. Confirm each one maps to a Carbon component.
  3. Generate code that implements EVERY item — none may be skipped, omitted, or merged away.

If the wireframe shows two tables → generate two tables.
If it shows pagination → generate <Pagination>.
If it shows tabs → generate <Tabs><TabList><Tab>.
If it shows a button → generate <Button>.
Missing even one element from the wireframe is a failure.

━━━ VIEWPORT ENFORCEMENT ━━━
Your rendered app must eliminate bottom whitespace:
  • Body/root: height: 100%; min-height: 100vh.
  • Wrap everything in a flex column that spans the viewport; give the main content flex: 1.
  • Inside <Content>, top-level layout containers should have style={{ display: 'flex', flexDirection: 'column', minHeight: 'calc(100vh - 48px)' }} (adjust if header present). Child panels in rows get flex: 1.
  • Tables, tab panels, and grid sections should use style={{ height: '100%', width: '100%' }} when placed inside flex parents so they stretch.
  • Maintain consistent gutters: use 16px gap for peer items in a row; align their top edges and match heights.

    <div id="right-panel">

      <div id="layers-pane">
        <div id="layers-pane-header">
          <span class="panel-label">Layers</span>
        </div>
        <div id="layers-list">
          <div class="layers-empty">No elements yet.</div>
        </div>
      </div>

      <div id="notes-pane">
        <span class="panel-label">Notes</span>
        <textarea id="notes-textarea" placeholder="Describe the layout, intent, or anything the AI should know…"></textarea>
      </div>

    </div>
  </div><!-- /tab-canvas -->


</div><!-- /tab-panels -->

<div id="toast"></div>
<input type="file" id="svg-single-input" accept=".svg" hidden>
<input type="file" id="wireframe-upload-input" accept=".html" hidden>


<script>

// ============================================================
//  THEME TOGGLE
// ============================================================
const themeToggle = document.getElementById('theme-toggle');
const iconSun     = document.getElementById('theme-icon-sun');
const iconMoon    = document.getElementById('theme-icon-moon');

function setTheme(dark) {
  document.body.classList.toggle('dark-mode', dark);
  iconSun.style.display  = dark ? 'block' : 'none';
  iconMoon.style.display = dark ? 'none'  : 'block';
  try { localStorage.setItem('theme', dark ? 'dark' : 'light'); } catch(e) {}
}

themeToggle.addEventListener('click', () => setTheme(!document.body.classList.contains('dark-mode')));

try { if (localStorage.getItem('theme') === 'dark') setTheme(true); } catch(e) {}


// ============================================================
//  CANVAS — STATE
// ============================================================
let elements    = [];
let selectedId  = null;
let currentTool = 'select';
let camera      = { x: 0, y: 0, zoom: 1 };
let svgLibrary  = [];
let isSpaceDown = false;
let idCounter   = 0;
let _typeCounts = {};

let ix = {
  type: null,
  startSX: 0, startSY: 0,
  startCX: 0, startCY: 0,
  elementId: null,
  startElX: 0, startElY: 0,
  startElW: 0, startElH: 0,
  handle: null,
  startCamX: 0, startCamY: 0,
};

// ============================================================
//  CANVAS — DOM
// ============================================================
const viewport      = document.getElementById('canvas-viewport');
const world         = document.getElementById('canvas-world');
const selOverlay    = document.getElementById('selection-overlay');
const drawPreview   = document.getElementById('draw-preview');
const notesTA       = document.getElementById('notes-textarea');
const svgLibList    = document.getElementById('svg-library-list');
const layersList    = document.getElementById('layers-list');
const zoomIndicator = document.getElementById('zoom-indicator');
const toast         = document.getElementById('toast');
const elementDivs   = new Map();

// ============================================================
//  CANVAS — UTILS
// ============================================================
function genId()    { return 'el_'  + (++idCounter); }
function genLibId() { return 'lib_' + (++idCounter); }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

function genName(type, svgName) {
  if (type === 'svg') return svgName || 'Icon';
  _typeCounts[type] = (_typeCounts[type] || 0) + 1;
  if (type === 'frame')    return 'Frame '        + _typeCounts[type];
  if (type === 'rect')     return 'Row Frame '    + _typeCounts[type];
  if (type === 'col-rect') return 'Column Frame ' + _typeCounts[type];
  if (type === 'circle')   return 'Circle '       + _typeCounts[type];
  return 'Shape ' + _typeCounts[type];
}

function defaultSizeMode(type, svgName) {
  const name = (svgName || '').toLowerCase();
  const fills = ['table', 'structured list', 'list', 'pagination', 'tabs', 'grid', 'chart', 'graph', 'canvas', 'map'];
  if (type === 'circle') return 'hug';
  if (type === 'frame' || type === 'rect' || type === 'col-rect') return 'fill';
  if (type === 'svg' && fills.some(k => name.includes(k))) return 'fill';
  // Buttons and inline controls should hug by default
  if (type === 'svg' && /button|tag|chip|icon/i.test(name)) return 'hug';
  return 'hug';
}

function getContainment() {
  // Order-agnostic containment: pick the smallest enclosing frame by area,
  // so late-added parents still win even if elements were drawn earlier.
  const map = {};
  const candidateFrames = elements
    .map((el, idx) => ({ el, idx, area: el.width * el.height }))
    .filter(c => c.el.type === 'frame' || c.el.type === 'rect' || c.el.type === 'col-rect')
    .sort((a, b) => (a.area - b.area) || (a.idx - b.idx));

  for (const el of elements) {
    let parent = null;
    for (const c of candidateFrames) {
      if (c.el.id === el.id) continue;
      if (
        el.x >= c.el.x && el.y >= c.el.y &&
        el.x + el.width  <= c.el.x + c.el.width &&
        el.y + el.height <= c.el.y + c.el.height
      ) { parent = c.el; break; }
    }
    map[el.id] = parent ? parent.id : null;
  }
  return map;
}

function renderLayers() {
  if (elements.length === 0) {
    layersList.innerHTML = '<div class="layers-empty">No elements yet.</div>';
    return;
  }
  const containment = getContainment();
  const children = {};
  for (const el of elements) {
    const pid = containment[el.id];
    if (pid) { if (!children[pid]) children[pid] = []; children[pid].push(el); }
  }
  const roots = [...elements].reverse().filter(el => !containment[el.id]);
  layersList.innerHTML = '';

  function renderItem(el, depth) {
    const isFrame = (el.type === 'frame' || el.type === 'rect' || el.type === 'col-rect') && children[el.id]?.length;
    const item = document.createElement('div');
    item.className = 'layer-item' + (el.id === selectedId ? ' selected' : '');
    item.style.paddingLeft = (8 + depth * 14) + 'px';

    const icon = document.createElement('span');
    icon.className = 'layer-icon';
    icon.textContent = isFrame ? '▣' : (el.type === 'frame' || el.type === 'rect' || el.type === 'col-rect') ? '▢' : el.type === 'circle' ? '◯' : '◈';

    const name = document.createElement('span');
    name.className = 'layer-name';
    name.textContent = el.name || el.id;

    item.appendChild(icon); item.appendChild(name);
    item.addEventListener('click', () => selectElement(el.id));
    layersList.appendChild(item);
    if (children[el.id]) for (const child of children[el.id]) renderItem(child, depth + 1);
  }
  for (const el of roots) renderItem(el, 0);
}

function screenToCanvas(clientX, clientY) {
  const r = viewport.getBoundingClientRect();
  return {
    x: (clientX - r.left - camera.x) / camera.zoom,
    y: (clientY - r.top  - camera.y) / camera.zoom,
  };
}

// ============================================================
//  CANVAS — RENDER
// ============================================================
function render() {
  world.style.transform =
    `translate(${camera.x}px,${camera.y}px) scale(${camera.zoom})`;

  const gs = 24 * camera.zoom;
  viewport.style.backgroundSize     = `${gs}px ${gs}px`;
  viewport.style.backgroundPosition = `${camera.x % gs}px ${camera.y % gs}px`;

  zoomIndicator.textContent = Math.round(camera.zoom * 100) + '%';

  renderElements();
  updateSelectionOverlay();
  renderLayers();
}

function renderElements() {
  for (const [id] of elementDivs) {
    if (!elements.find(e => e.id === id)) {
      const d = elementDivs.get(id);
      d.parentNode && d.parentNode.removeChild(d);
      elementDivs.delete(id);
    }
  }
  for (const el of elements) {
    if (!elementDivs.has(el.id)) {
      const d = buildElementDiv(el);
      world.appendChild(d);
      elementDivs.set(el.id, d);
    }
    positionElementDiv(el, elementDivs.get(el.id));
  }
}

function buildElementDiv(el) {
  const d = document.createElement('div');
  d.className = 'canvas-element';
  d.dataset.id = el.id;

  if (el.type === 'frame' || el.type === 'rect' || el.type === 'col-rect') {
    d.classList.add('rect-el');
    const lbl = document.createElement('span');
    lbl.className = 'frame-label';
    const rc = el.type === 'rect' ? 'R' : el.type === 'col-rect' ? 'C' : '';
    lbl.textContent = rc;
    d.appendChild(lbl);
  }
  if (el.type === 'circle') d.classList.add('circle-el');
  if (el.type === 'svg') {
    d.classList.add('svg-el');
    d.innerHTML = el.svgContent;
    const s = d.querySelector('svg');
    if (s) { s.style.width = '100%'; s.style.height = '100%'; s.setAttribute('preserveAspectRatio', 'xMidYMid meet'); }
  }
  d.addEventListener('mousedown', onElementMouseDown);
  return d;
}

function positionElementDiv(el, d) {
  d.style.left   = el.x      + 'px';
  d.style.top    = el.y      + 'px';
  d.style.width  = el.width  + 'px';
  d.style.height = el.height + 'px';
  const lbl = d.querySelector('.frame-label');
  if (lbl) {
    const rc = (el.type === 'rect' ? 'R' : el.type === 'col-rect' ? 'C' : '');
    lbl.textContent = rc;
  }
}

function updateSelectionOverlay() {
  if (!selectedId) { selOverlay.style.display = 'none'; return; }
  const el = elements.find(e => e.id === selectedId);
  if (!el)          { selOverlay.style.display = 'none'; return; }
  selOverlay.style.display = 'block';
  selOverlay.style.left   = (el.x     * camera.zoom + camera.x) + 'px';
  selOverlay.style.top    = (el.y     * camera.zoom + camera.y) + 'px';
  selOverlay.style.width  = (el.width * camera.zoom) + 'px';
  selOverlay.style.height = (el.height* camera.zoom) + 'px';
}


// ============================================================
//  CANVAS — ELEMENT OPS
// ============================================================
function addElement(el)    { elements.push(el); render(); }
function removeElement(id) { elements = elements.filter(e => e.id !== id); if (selectedId === id) selectedId = null; render(); }
function selectElement(id) { selectedId = id; render(); }
function deselectAll()     { selectedId = null; render(); }

function updateElement(id, props) {
  const el = elements.find(e => e.id === id);
  if (!el) return;
  Object.assign(el, props);
  const d = elementDivs.get(id);
  if (d) positionElementDiv(el, d);
  updateSelectionOverlay();
}

function getSvgSize(content) {
  const doc = new DOMParser().parseFromString(content, 'image/svg+xml');
  const s   = doc.querySelector('svg');
  if (!s) return { width: 200, height: 200 };
  const vb = s.getAttribute('viewBox');
  if (vb) {
    const p = vb.trim().split(/[\s,]+/);
    if (p.length >= 4) { const w = parseFloat(p[2]), h = parseFloat(p[3]); if (w > 0 && h > 0) return { width: w, height: h }; }
  }
  const ws = s.getAttribute('width'), hs = s.getAttribute('height');
  const w = ws && !ws.includes('%') ? parseFloat(ws) : NaN;
  const h = hs && !hs.includes('%') ? parseFloat(hs) : NaN;
  if (w > 0 && h > 0) return { width: w, height: h };
  return { width: 200, height: 200 };
}

function ensureSizeDefaults() {
  for (const el of elements) {
    if (!el.sizeMode) el.sizeMode = defaultSizeMode(el.type, el.svgName);
  }
}

// ============================================================
//  CANVAS — TOOLS
// ============================================================
function setTool(tool) {
  currentTool = tool;
  document.querySelectorAll('.tool-btn').forEach(b => b.classList.toggle('active', b.dataset.tool === tool));
  if (tool === 'select')                                                           viewport.style.cursor = 'default';
  else if (tool === 'frame' || tool === 'rect' || tool === 'col-rect' || tool === 'circle') viewport.style.cursor = 'crosshair';
}

// ============================================================
//  CANVAS — MOUSE EVENTS
// ============================================================
function onElementMouseDown(e) {
  if (currentTool !== 'select') return;
  e.stopPropagation();
  const id = e.currentTarget.dataset.id;
  selectElement(id);
  const el = elements.find(el => el.id === id);
  ix.type = 'move'; ix.elementId = id;
  ix.startSX = e.clientX; ix.startSY = e.clientY;
  ix.startElX = el.x; ix.startElY = el.y;
  viewport.style.cursor = 'grabbing';
  e.preventDefault();
}

function startPan(e) {
  ix.type = 'pan'; ix.startSX = e.clientX; ix.startSY = e.clientY;
  ix.startCamX = camera.x; ix.startCamY = camera.y;
  viewport.style.cursor = 'grabbing';
}

viewport.addEventListener('mousedown', e => {
  if (e.button === 1) { startPan(e); e.preventDefault(); return; }
  if (e.button !== 0) return;

  if (e.target.classList.contains('resize-handle')) {
    const el = elements.find(el => el.id === selectedId);
    if (!el) return;
    ix.type = 'resize'; ix.handle = e.target.dataset.handle; ix.elementId = selectedId;
    ix.startSX = e.clientX; ix.startSY = e.clientY;
    ix.startElX = el.x; ix.startElY = el.y; ix.startElW = el.width; ix.startElH = el.height;
    e.preventDefault(); return;
  }

  if (isSpaceDown) { startPan(e); return; }

  if (currentTool === 'frame' || currentTool === 'rect' || currentTool === 'col-rect' || currentTool === 'circle') {
    const cp = screenToCanvas(e.clientX, e.clientY);
    ix.type = 'draw'; ix.startSX = e.clientX; ix.startSY = e.clientY; ix.startCX = cp.x; ix.startCY = cp.y;
    drawPreview.className = (currentTool === 'frame' || currentTool === 'rect' || currentTool === 'col-rect') ? 'rect-preview' : 'circle-preview';
    drawPreview.style.cssText = 'display:block;left:0;top:0;width:0;height:0;';
    e.preventDefault(); return;
  }

  if (currentTool === 'select') deselectAll();
});

document.addEventListener('mousemove', e => {
  if (!ix.type) return;

  if (ix.type === 'pan') {
    camera.x = ix.startCamX + (e.clientX - ix.startSX);
    camera.y = ix.startCamY + (e.clientY - ix.startSY);
    render(); return;
  }

  if (ix.type === 'move') {
    updateElement(ix.elementId, {
      x: ix.startElX + (e.clientX - ix.startSX) / camera.zoom,
      y: ix.startElY + (e.clientY - ix.startSY) / camera.zoom,
    }); return;
  }

  if (ix.type === 'resize') {
    const dx = (e.clientX - ix.startSX) / camera.zoom;
    const dy = (e.clientY - ix.startSY) / camera.zoom;
    const h  = ix.handle;
    let nx = ix.startElX, ny = ix.startElY, nw = ix.startElW, nh = ix.startElH;
    if (h.includes('e'))      nw = Math.max(10, ix.startElW + dx);
    else if (h.includes('w')) { const d = Math.min(dx, ix.startElW - 10); nx += d; nw -= d; }
    if (h.includes('s'))      nh = Math.max(10, ix.startElH + dy);
    else if (h.includes('n')) { const d = Math.min(dy, ix.startElH - 10); ny += d; nh -= d; }
    updateElement(ix.elementId, { x: nx, y: ny, width: nw, height: nh }); return;
  }

  if (ix.type === 'draw') {
    const vr  = viewport.getBoundingClientRect();
    const curX = e.clientX - vr.left, curY = e.clientY - vr.top;
    const stX  = ix.startSX - vr.left,  stY  = ix.startSY - vr.top;
    let left = Math.min(curX, stX), top = Math.min(curY, stY);
    let w = Math.abs(curX - stX), h = Math.abs(curY - stY);
    if (currentTool === 'circle') { const s = Math.max(w, h); w = s; h = s; }
    drawPreview.style.left = left + 'px'; drawPreview.style.top = top + 'px';
    drawPreview.style.width = w + 'px';  drawPreview.style.height = h + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if (!ix.type) return;
  if (ix.type === 'draw') {
    const startCP = screenToCanvas(ix.startSX, ix.startSY);
    const endCP   = screenToCanvas(e.clientX, e.clientY);
    let cx = Math.min(startCP.x, endCP.x), cy = Math.min(startCP.y, endCP.y);
    let cw = Math.abs(endCP.x - startCP.x), ch = Math.abs(endCP.y - startCP.y);
    if (cw > 3 || ch > 3) {
      if (currentTool === 'circle') { const s = Math.max(cw, ch); cw = s; ch = s; }
      const _t = currentTool === 'frame' ? 'frame' : currentTool === 'rect' ? 'rect' : currentTool === 'col-rect' ? 'col-rect' : 'circle';
      const el = { id: genId(), type: _t, name: genName(_t),
                   x: cx, y: cy, width: cw, height: ch, svgContent: null, svgName: null,
                   sizeMode: defaultSizeMode(_t) };
      addElement(el); selectElement(el.id);
    }
    drawPreview.style.display = 'none'; drawPreview.className = '';
  }
  if (ix.type === 'pan' || ix.type === 'move')
    viewport.style.cursor = isSpaceDown ? 'grab' : currentTool === 'select' ? 'default' : 'crosshair';
  ix.type = null;
});

viewport.addEventListener('wheel', e => {
  e.preventDefault();
  const vr = viewport.getBoundingClientRect();
  const mx = e.clientX - vr.left, my = e.clientY - vr.top;
  const factor  = e.deltaY < 0 ? 1.1 : 1 / 1.1;
  const newZoom = clamp(camera.zoom * factor, 0.05, 20);
  camera.x = mx - (mx - camera.x) * (newZoom / camera.zoom);
  camera.y = my - (my - camera.y) * (newZoom / camera.zoom);
  camera.zoom = newZoom;
  render();
}, { passive: false });

// ============================================================
//  CANVAS — KEYBOARD
// ============================================================
document.addEventListener('keydown', e => {
  const active = document.activeElement;
  if (active && (active.tagName === 'INPUT' || active.tagName === 'TEXTAREA')) return;
  if (e.code === 'Space' && !isSpaceDown) { e.preventDefault(); isSpaceDown = true; if (!ix.type) viewport.style.cursor = 'grab'; }
  if (e.key === 'Delete' || e.key === 'Backspace') { if (selectedId) removeElement(selectedId); }
  if (e.key === 'Escape') {
    if (ix.type === 'draw') { drawPreview.style.display = 'none'; drawPreview.className = ''; ix.type = null; }
    deselectAll();
  }
  if (e.key === 'v' || e.key === 'V') setTool('select');
  if (e.key === 'f' || e.key === 'F') setTool('frame');
  if (e.key === 'r' || e.key === 'R') setTool('rect');
  if (e.key === 'c' || e.key === 'C') setTool('col-rect');
});

document.addEventListener('keyup', e => {
  if (e.code === 'Space') { isSpaceDown = false; if (!ix.type) viewport.style.cursor = currentTool === 'select' ? 'default' : 'crosshair'; }
});

document.querySelectorAll('.tool-btn').forEach(b => { if (b.dataset.tool) b.addEventListener('click', () => setTool(b.dataset.tool)); });

// ============================================================
//  SVG LIBRARY
// ============================================================
document.getElementById('upload-svgs-btn').addEventListener('click', () => document.getElementById('svg-library-input').click());

document.getElementById('svg-library-input').addEventListener('change', e => {
  Array.from(e.target.files).forEach(file => {
    const reader = new FileReader();
    reader.onload = ev => addToLibrary(file.name.replace(/\.svg$/i, ''), ev.target.result);
    reader.readAsText(file);
  });
  e.target.value = '';
});

function addToLibrary(name, content) {
  svgLibrary.push({ id: genLibId(), name, content });
  renderLibrary();
}

function removeFromLibrary(id) {
  svgLibrary = svgLibrary.filter(i => i.id !== id);
  renderLibrary();
}

let dragLibId = null;

function renderLibrary() {
  if (svgLibrary.length === 0) {
    svgLibList.innerHTML = '<div class="svg-lib-empty">Upload SVG files to build your library, then drag them onto the canvas.</div>';
    return;
  }
  svgLibList.innerHTML = '';
  for (const item of svgLibrary) {
    const card = document.createElement('div');
    card.className = 'svg-lib-item'; card.draggable = true; card.dataset.libId = item.id;

    const preview = document.createElement('div'); preview.className = 'svg-lib-preview';
    preview.innerHTML = item.content;
    const s = preview.querySelector('svg');
    if (s) { s.removeAttribute('width'); s.removeAttribute('height'); s.style.maxWidth = '100%'; s.style.maxHeight = '56px'; }

    const nameEl = document.createElement('div'); nameEl.className = 'svg-lib-name';
    nameEl.textContent = item.name; nameEl.title = item.name;

    const delBtn = document.createElement('button'); delBtn.className = 'svg-lib-delete';
    delBtn.innerHTML = '&times;'; delBtn.title = 'Remove';
    delBtn.addEventListener('click', ev => { ev.stopPropagation(); removeFromLibrary(item.id); });

    card.appendChild(preview); card.appendChild(nameEl); card.appendChild(delBtn);
    card.addEventListener('dragstart', ev => { dragLibId = item.id; card.classList.add('dragging'); ev.dataTransfer.effectAllowed = 'copy'; ev.dataTransfer.setData('text/plain', item.id); });
    card.addEventListener('dragend',   () => { card.classList.remove('dragging'); dragLibId = null; });
    svgLibList.appendChild(card);
  }
}

viewport.addEventListener('dragover',  e => { e.preventDefault(); e.dataTransfer.dropEffect = 'copy'; viewport.classList.add('drag-over'); });
viewport.addEventListener('dragleave', () => viewport.classList.remove('drag-over'));
viewport.addEventListener('drop', e => {
  e.preventDefault(); viewport.classList.remove('drag-over');
  const libItem = svgLibrary.find(i => i.id === dragLibId);
  if (!libItem) return;
  const size = getSvgSize(libItem.content);
  const cp   = screenToCanvas(e.clientX, e.clientY);
  const maxDim = 300;
  let w = size.width, h = size.height;
  if (w > maxDim || h > maxDim) { const r = Math.min(maxDim / w, maxDim / h); w *= r; h *= r; }
  const el = { id: genId(), type: 'svg', name: genName('svg', libItem.name), x: cp.x - w / 2, y: cp.y - h / 2, width: w, height: h, svgContent: libItem.content, svgName: libItem.name, sizeMode: defaultSizeMode('svg', libItem.name) };
  addElement(el); selectElement(el.id); dragLibId = null;
});

document.getElementById('svg-single-input').addEventListener('change', e => {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const content = ev.target.result; const size = getSvgSize(content);
    const vr = viewport.getBoundingClientRect();
    const cp = screenToCanvas(vr.left + vr.width / 2, vr.top + vr.height / 2);
    const maxDim = 300; let w = size.width, h = size.height;
    if (w > maxDim || h > maxDim) { const r = Math.min(maxDim / w, maxDim / h); w *= r; h *= r; }
    const _sn = file.name.replace(/\.svg$/i, '');
    const el = { id: genId(), type: 'svg', name: genName('svg', _sn), x: cp.x - w / 2, y: cp.y - h / 2, width: w, height: h, svgContent: content, svgName: _sn, sizeMode: defaultSizeMode('svg', _sn) };
    addElement(el); selectElement(el.id);
    addToLibrary(_sn, content);
  };
  reader.readAsText(file); e.target.value = '';
});

// ============================================================
//  UPLOAD WIREFRAME
// ============================================================
document.getElementById('upload-wireframe-btn').addEventListener('click', () => {
  document.getElementById('wireframe-upload-input').click();
});

document.getElementById('wireframe-upload-input').addEventListener('change', e => {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const html = ev.target.result;
    const marker = 'window.__WIREFRAME_SEED__=';
    const idx = html.indexOf(marker);
    if (idx === -1) { showToast('No wireframe data found in file'); return; }
    const start = html.indexOf('{', idx);
    if (start === -1) { showToast('Invalid wireframe file'); return; }
    // Find matching closing brace by counting depth
    let depth = 0, end = start;
    for (; end < html.length; end++) {
      if (html[end] === '{') depth++;
      else if (html[end] === '}') { depth--; if (depth === 0) { end++; break; } }
    }
    try {
      const seed = JSON.parse(html.slice(start, end));
      elements   = seed.elements   || [];
      camera     = seed.camera     || camera;
      svgLibrary = seed.svgLibrary || [];
      selectedId = null;
      // Clear existing element divs
      for (const [, div] of elementDivs) { div.parentNode && div.parentNode.removeChild(div); }
      elementDivs.clear();
      // Rebuild idCounter
      [...elements, ...svgLibrary].forEach(item => {
        const n = parseInt((item.id || '').replace(/^\D+/, ''), 10);
        if (n > idCounter) idCounter = n;
      });
      // Rebuild _typeCounts
      _typeCounts = {};
      for (const el of elements) {
        const m = (el.name || '').match(/^(Row Frame|Column Frame|Frame|Circle|Shape)\s+(\d+)$/);
        if (m) {
          const t = m[1] === 'Row Frame' ? 'rect'
                  : m[1] === 'Column Frame' ? 'col-rect'
                  : m[1] === 'Frame' ? 'frame'
                  : m[1].toLowerCase();
          const n = parseInt(m[2], 10);
          if (n > (_typeCounts[t] || 0)) _typeCounts[t] = n;
        }
      }
      notesTA.value = seed.notes || '';
      ensureSizeDefaults();
      renderLibrary();
      render();
      showToast('Wireframe loaded!');
    } catch (err) {
      showToast('Could not parse wireframe: ' + err.message);
    }
  };
  reader.readAsText(file); e.target.value = '';
});

// Render all canvas elements to a PNG and return a base64 data URL.
// This lets GPT-4o *see* the layout directly instead of relying on text.
function buildWireframeSnapshot() {
  if (elements.length === 0) return null;

  const PAD = 24;
  const minX = Math.min(...elements.map(e => e.x));
  const minY = Math.min(...elements.map(e => e.y));
  const maxX = Math.max(...elements.map(e => e.x + e.width));
  const maxY = Math.max(...elements.map(e => e.y + e.height));
  const W = maxX - minX + PAD * 2;
  const H = maxY - minY + PAD * 2;

  const cv = document.createElement('canvas');
  cv.width = W; cv.height = H;
  const ctx = cv.getContext('2d');

  // Background
  ctx.fillStyle = '#f4f4f4';
  ctx.fillRect(0, 0, W, H);

  // Sort so parents draw before children (larger area first)
  const sorted = [...elements].sort((a, b) => (b.width * b.height) - (a.width * a.height));

  for (const el of sorted) {
    const x = el.x - minX + PAD;
    const y = el.y - minY + PAD;
    const w = el.width;
    const h = el.height;

    ctx.save();

    if (el.type === 'circle') {
      ctx.beginPath();
      ctx.ellipse(x + w / 2, y + h / 2, w / 2, h / 2, 0, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(209,209,209,0.5)';
      ctx.fill();
      ctx.strokeStyle = '#6f6f6f';
      ctx.lineWidth = 1.5;
      ctx.stroke();
    } else if (el.type === 'svg') {
      // SVG components: blue tinted box
      ctx.fillStyle = 'rgba(15,98,254,0.08)';
      ctx.fillRect(x, y, w, h);
      ctx.strokeStyle = '#0f62fe';
      ctx.lineWidth = 1.5;
      ctx.setLineDash([4, 3]);
      ctx.strokeRect(x, y, w, h);
      ctx.setLineDash([]);
    } else {
      // frame / rect / col-rect
      const isRow = el.type === 'rect';
      const isCol = el.type === 'col-rect';
      ctx.fillStyle = isRow ? 'rgba(215,228,255,0.35)' : isCol ? 'rgba(215,255,224,0.35)' : 'rgba(232,232,232,0.4)';
      ctx.fillRect(x, y, w, h);
      ctx.strokeStyle = isRow ? '#4589ff' : isCol ? '#24a148' : '#8d8d8d';
      ctx.lineWidth = isRow || isCol ? 2 : 1.5;
      ctx.strokeRect(x, y, w, h);
    }

    // Label
    const label = el.svgName || el.name || '';
    if (label) {
      const fontSize = Math.max(9, Math.min(13, h * 0.22));
      ctx.font = `600 ${fontSize}px -apple-system, sans-serif`;
      ctx.fillStyle = el.type === 'svg' ? '#0f62fe' : '#161616';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      // Clip text to box
      ctx.save();
      ctx.rect(x + 2, y + 2, w - 4, h - 4);
      ctx.clip();
      ctx.fillText(label, x + w / 2, y + h / 2);
      ctx.restore();
    }

    // Corner type badge (R / C)
    if (el.type === 'rect' || el.type === 'col-rect') {
      ctx.font = 'bold 9px monospace';
      ctx.fillStyle = el.type === 'rect' ? '#4589ff' : '#24a148';
      ctx.textAlign = 'right';
      ctx.textBaseline = 'top';
      ctx.fillText(el.type === 'rect' ? 'R' : 'C', x + w - 3, y + 3);
    }

    ctx.restore();
  }

  return cv.toDataURL('image/png');
}

function buildWireframeContext() {
  if (elements.length === 0) {
    return `Canvas: (empty)\n\nDesigner notes: ${notesTA.value.trim() || '(none)'}`;
  }
  const containment = getContainment();
  const children = {};
  for (const el of elements) {
    const pid = containment[el.id];
    if (pid) { if (!children[pid]) children[pid] = []; children[pid].push(el); }
  }
  const roots = elements.filter(el => !containment[el.id]);

  // For a plain frame parent, infer spatial orientation from child pixel positions
  function inferOrientation(kids) {
    if (kids.length < 2) return null;
    const sorted = [...kids].sort((a, b) => a.x - b.x);
    const xSpread = sorted[sorted.length - 1].x - sorted[0].x;
    const ySpread = Math.max(...kids.map(k => k.y)) - Math.min(...kids.map(k => k.y));
    return xSpread >= ySpread ? 'row' : 'col';
  }

  const layoutHints = [];

  function describe(el, depth, siblingIndex, siblingCount, parentType, parentOrientation) {
    const indent = '  '.repeat(depth);
    const isFrame = (el.type === 'frame' || el.type === 'rect' || el.type === 'col-rect') && children[el.id]?.length;
    const typeStr = isFrame
      ? (el.type === 'col-rect' ? 'Column Frame (flex-direction:column)' : el.type === 'rect' ? 'Row Frame (flex-direction:row)' : 'Frame')
      : el.type === 'frame'    ? 'Rectangle'
      : el.type === 'rect'     ? 'Row Rectangle (flex-direction:row)'
      : el.type === 'col-rect' ? 'Column Rectangle (flex-direction:column)'
      : el.type === 'circle'   ? 'Circle'
      : `SVG "${el.svgName || 'icon'}"`;
    const nameStr = el.name ? `"${el.name}" ` : '';
    const dims = `${Math.round(el.width)}×${Math.round(el.height)}`;

    // Derive position label from parent type OR inferred orientation
    let posLabel = '';
    if (siblingCount > 1) {
      const effOrientation = parentType === 'rect' ? 'row'
        : parentType === 'col-rect' ? 'col'
        : parentOrientation; // inferred for plain frames
      if (effOrientation === 'row') {
        const pos = siblingCount === 2 ? (siblingIndex === 0 ? 'LEFT' : 'RIGHT')
          : ['LEFT', 'CENTER', 'RIGHT'][siblingIndex] || `COL-${siblingIndex + 1}`;
        posLabel = ` [${pos} — visible simultaneously, NOT a tab panel]`;
      } else if (effOrientation === 'col') {
        const pos = siblingIndex === 0 ? 'TOP' : siblingIndex === siblingCount - 1 ? 'BOTTOM' : 'MIDDLE';
        posLabel = ` [${pos} — stacked, visible simultaneously]`;
      }
    }

    let line = `${indent}${isFrame ? '▣' : '•'} ${nameStr}[${typeStr}]${posLabel} ${dims}`;

    if (children[el.id]) {
      const kids = children[el.id];
      // Infer orientation for plain-frame children
      const childOrientation = (el.type === 'frame') ? inferOrientation(kids) : null;

      // Sort children by visual position so labels reflect what the user sees, not insertion order
      const effDir = el.type === 'rect' ? 'row' : el.type === 'col-rect' ? 'col' : childOrientation;
      const orderedKids = [...kids].sort((a, b) =>
        effDir === 'row' ? a.x - b.x : a.y - b.y
      );

      // Build layout hint for this frame
      const hasTabs = orderedKids.some(k => k.type === 'svg' && /tabs/i.test(k.svgName || ''));
      const frameKids = orderedKids.filter(k => k.type === 'frame' || k.type === 'rect' || k.type === 'col-rect');
      if (orderedKids.length > 1 && (el.type === 'rect' || el.type === 'col-rect' || el.type === 'frame')) {
        const dir = el.type === 'rect' ? 'ROW (left→right)'
          : el.type === 'col-rect' ? 'COLUMN (top→bottom)'
          : childOrientation === 'row' ? 'ROW (left→right, inferred from position)'
          : childOrientation === 'col' ? 'COLUMN (top→bottom, inferred from position)'
          : 'STACKED';
        const names = orderedKids.map(c => `"${c.name || c.svgName || c.type}"`).join(', ');
        let hint = `  • "${el.name || el.id}" lays out its children ${dir}: [${names}] — ALL rendered simultaneously.`;
        if (hasTabs && frameKids.length > 0) {
          const tabKid = orderedKids.find(k => k.type === 'svg' && /tabs/i.test(k.svgName || ''));
          const others = frameKids.map(c => `"${c.name || c.id}"`).join(', ');
          hint += `\n    ⚠ TABS WARNING: "${tabKid?.name || 'Tabs'}" is a navigation widget at this level. The frames [${others}] are its SIBLINGS, NOT its tab panels. Render them all simultaneously — do NOT wrap them in TabPanel content.`;
        }
        layoutHints.push(hint);
      }

      const orderLabel = el.type === 'rect' ? 'left→right' : el.type === 'col-rect' ? 'top→bottom' : (childOrientation === 'row' ? 'left→right (inferred)' : childOrientation === 'col' ? 'top→bottom (inferred)' : null);
      if (orderLabel) {
        const names = orderedKids.map(c => c.name || c.svgName || c.type).join('  ·  ');
        line += `\n${indent}  ↳ Order (${orderLabel}): ${names}`;
      }
      for (let i = 0; i < orderedKids.length; i++) {
        line += '\n' + describe(orderedKids[i], depth + 1, i, orderedKids.length, el.type, childOrientation);
      }
    }
    return line;
  }

  // Infer orientation of root-level siblings and sort them by visual position
  const rootOrientation = roots.length > 1 ? inferOrientation(roots) : null;
  const sortedRoots = [...roots].sort((a, b) =>
    rootOrientation === 'row' ? a.x - b.x : a.y - b.y
  );
  const desc = sortedRoots.map((el, i) => describe(el, 0, i, sortedRoots.length, null, rootOrientation)).join('\n');

  const layoutSummary = layoutHints.length
    ? `\nLAYOUT SUMMARY — follow exactly, do NOT collapse siblings into tabs or conditional rendering:\n${layoutHints.join('\n')}\n`
    : '';

  return `WIREFRAME LAYOUT (indented = visually inside parent):\n\n${desc}\n${layoutSummary}\nDesigner notes: ${notesTA.value.trim() || '(none)'}`;
}


// ============================================================
//  ZIP WRITER  (no external libs — pure vanilla)
// ============================================================
const _CRC_TABLE = (() => {
  const t = new Uint32Array(256);
  for (let i = 0; i < 256; i++) {
    let c = i;
    for (let j = 0; j < 8; j++) c = (c & 1) ? 0xEDB88320 ^ (c >>> 1) : c >>> 1;
    t[i] = c;
  }
  return t;
})();

function _crc32(bytes) {
  let c = 0xFFFFFFFF;
  for (let i = 0; i < bytes.length; i++) c = (c >>> 8) ^ _CRC_TABLE[(c ^ bytes[i]) & 0xFF];
  return (c ^ 0xFFFFFFFF) >>> 0;
}

function createZip(files) {
  const enc = new TextEncoder();
  const locals = [], centrals = [];
  let offset = 0;

  for (const { name, content } of files) {
    const nb  = enc.encode(name);
    const db  = typeof content === 'string' ? enc.encode(content) : content;
    const crc = _crc32(db);
    const sz  = db.length;

    // Local file header (30) + filename + data
    const lh = new Uint8Array(30 + nb.length + sz);
    const lv = new DataView(lh.buffer);
    lv.setUint32( 0, 0x04034b50, true); // signature
    lv.setUint16( 4, 20,         true); // version needed
    lv.setUint16( 6,  0,         true); // flags
    lv.setUint16( 8,  0,         true); // compression: STORE
    lv.setUint16(10,  0,         true); // mod time
    lv.setUint16(12,  0,         true); // mod date
    lv.setUint32(14, crc,        true); // crc-32
    lv.setUint32(18, sz,         true); // compressed size
    lv.setUint32(22, sz,         true); // uncompressed size
    lv.setUint16(26, nb.length,  true); // filename length
    lv.setUint16(28,  0,         true); // extra field length
    lh.set(nb, 30); lh.set(db, 30 + nb.length);

    // Central directory header (46) + filename
    const ch = new Uint8Array(46 + nb.length);
    const cv = new DataView(ch.buffer);
    cv.setUint32( 0, 0x02014b50, true);
    cv.setUint16( 4, 20,         true); // version made by
    cv.setUint16( 6, 20,         true); // version needed
    cv.setUint16( 8,  0,         true); // flags
    cv.setUint16(10,  0,         true); // compression
    cv.setUint16(12,  0,         true); // mod time
    cv.setUint16(14,  0,         true); // mod date
    cv.setUint32(16, crc,        true);
    cv.setUint32(20, sz,         true);
    cv.setUint32(24, sz,         true);
    cv.setUint16(28, nb.length,  true);
    cv.setUint16(30,  0,         true); // extra field length
    cv.setUint16(32,  0,         true); // comment length
    cv.setUint16(34,  0,         true); // disk start
    cv.setUint16(36,  0,         true); // internal attrs
    cv.setUint32(38,  0,         true); // external attrs
    cv.setUint32(42, offset,     true); // local header offset
    ch.set(nb, 46);

    locals.push(lh); centrals.push(ch);
    offset += lh.length;
  }

  // End of central directory record
  const cdSz = centrals.reduce((s, c) => s + c.length, 0);
  const eocd = new Uint8Array(22);
  const ev   = new DataView(eocd.buffer);
  ev.setUint32( 0, 0x06054b50,   true); // signature
  ev.setUint16( 4,  0,           true); // disk number
  ev.setUint16( 6,  0,           true); // central dir disk
  ev.setUint16( 8, files.length, true); // entries on disk
  ev.setUint16(10, files.length, true); // total entries
  ev.setUint32(12, cdSz,         true); // central dir size
  ev.setUint32(16, offset,       true); // central dir offset
  ev.setUint16(20,  0,           true); // comment length

  // Concatenate everything
  const total = offset + cdSz + 22;
  const out   = new Uint8Array(total);
  let pos = 0;
  for (const p of [...locals, ...centrals]) { out.set(p, pos); pos += p.length; }
  out.set(eocd, pos);
  return out;
}

// ============================================================
//  FILE PARSER  — extract filename + code from AI responses
// ============================================================
function parseCodeFiles(text) {
  const files = [], seen = new Set();
  const EXT_RE = /\.(jsx?|tsx?|css|json|md|html|gitignore|env)$/i;
  const ROOT_FILES = new Set(['package.json', 'vite.config.js', 'vite.config.ts', '.gitignore', '.env', 'index.html']);

  // Walk every code fence in the response
  const FENCE_RE = /```(\w*)\n?([\s\S]*?)```/g;
  let m;
  while ((m = FENCE_RE.exec(text)) !== null) {
    const lang = m[1].toLowerCase();
    const code = m[2].trim();
    if (!code || code.length < 10) continue;

    let filename = null;

    // 1. Look backwards in the preceding ~300 chars for a filename on its own line
    const before = text.slice(Math.max(0, m.index - 300), m.index);
    const beforeLines = before.split('\n');
    for (let i = beforeLines.length - 1; i >= Math.max(0, beforeLines.length - 5); i--) {
      const raw = beforeLines[i].trim()
        .replace(/^#{1,6}\s+/, '')   // ## heading
        .replace(/^\d+\.\s+/, '')    // 1. list
        .replace(/[*`]/g, '')        // **bold** / `code`
        .replace(/[:\s]+$/, '');     // trailing colon / spaces
      if (EXT_RE.test(raw) && raw.length < 80 && !raw.includes(' ')) {
        filename = raw;
        break;
      }
    }

    // 2. Filename as first-line comment inside the block  (// src/App.jsx)
    if (!filename) {
      const firstLine = code.split('\n')[0];
      const hit = firstLine.match(/^(?:\/\/|#)\s*(\S+)/);
      if (hit && EXT_RE.test(hit[1])) filename = hit[1];
    }

    // 3. ```lang filename on the opening fence line
    if (!filename) {
      const fenceLine = text.slice(m.index, m.index + 80).split('\n')[0];
      const hit = fenceLine.match(/```\w+\s+(\S+)/);
      if (hit && EXT_RE.test(hit[1])) filename = hit[1];
    }

    // 4. Auto-assign based on code content / language
    if (!filename) {
      if (code.includes('ReactDOM.createRoot') || code.includes("from 'react-dom/client'")) {
        filename = 'src/index.jsx';
      } else if (lang === 'css' || code.trimStart().startsWith('@import')) {
        if (!seen.has('src/index.css')) { filename = 'src/index.css'; }
        else { let n = 2; while (seen.has(`src/styles${n}.css`)) n++; filename = `src/styles${n}.css`; }
      } else if (lang === 'json' && code.includes('"name"')) {
        filename = 'package.json';
      } else if (code.includes('export default function App') || code.includes('export default App')) {
        filename = 'src/App.jsx';
      } else {
        let n = 1;
        while (seen.has(`src/components/Component${n}.jsx`)) n++;
        filename = `src/components/Component${n}.jsx`;
      }
    }

    // Normalize: bare names → src/  (but leave root config files alone)
    if (filename && !filename.includes('/') && EXT_RE.test(filename) && !ROOT_FILES.has(filename)) {
      filename = `src/${filename}`;
    }

    if (filename && !seen.has(filename)) {
      files.push({ name: filename, content: code });
      seen.add(filename);
    }
  }

  return files;
}

document.getElementById('download-code-btn').addEventListener('click', () => {
  const userFiles = Object.entries(generatedFiles).map(([name, content]) => ({ name, content }));
  if (!userFiles.length) return;

  // Merge with boilerplate — AI-generated files take priority
  const merged = [...userFiles];
  for (const [name, content] of Object.entries(_BP)) {
    if (generatedFiles[name] === undefined) merged.push({ name, content });
  }

  const zip  = createZip(merged);
  const blob = new Blob([zip], { type: 'application/zip' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = 'wireframe-project.zip';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast(`Downloaded ${merged.length} files!`);
});

async function sendToOpenAI(userMessage) {
  if (_aiInFlight) return;
  const key = apiKeyInput.value.trim();
  if (!key) {
    apiKeyStatus.textContent = 'Paste your API key first'; apiKeyStatus.className = 'err'; return;
  }
  _aiInFlight = true;
  setSendBtnLoading(true);

  let fullResponse = '';

  try {
    const messages = [
      { role: 'system', content: SYSTEM_PROMPT },
      _wireframeSnapshot
        ? { role: 'user', content: [
            { type: 'text', text: userMessage },
            { type: 'image_url', image_url: { url: _wireframeSnapshot, detail: 'low' } }
          ]}
        : { role: 'user', content: userMessage }
    ];

    const res = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + key },
      body: JSON.stringify({ model: 'gpt-4o', stream: true, temperature: 0, messages }),
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error?.message || `HTTP ${res.status}`);
    }

    const reader  = res.body.getReader();
    const decoder = new TextDecoder();
    let   buffer  = '';
    let   streamDone = false;

    while (!streamDone) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6).trim();
        if (data === '[DONE]') { streamDone = true; break; }
        try {
          const delta = JSON.parse(data).choices?.[0]?.delta?.content;
          if (delta) fullResponse += delta;
        } catch { /* skip malformed */ }
      }
    }

    updateGeneratedFiles(fullResponse);
    const count = Object.keys(generatedFiles).length;
    if (count) {
      showToast(`${count} file${count !== 1 ? 's' : ''} ready — click Download Code`);
    } else {
      showToast('Done — no code files detected in response');
    }
    apiKeyStatus.textContent = ''; apiKeyStatus.className = '';

  } catch (err) {
    showToast('Error: ' + err.message);
    apiKeyStatus.textContent = err.message; apiKeyStatus.className = 'err';
  } finally {
    _aiInFlight = false;
    setSendBtnLoading(false);
  }
}

// "Generate" button
document.getElementById('wf-send-btn').addEventListener('click', () => {
  if (elements.length === 0) { showToast('Draw something on the canvas first'); return; }

  generatedFiles = {};
  _wireframeSnapshot = null;
  document.getElementById('download-code-btn').style.display = 'none';

  const wfText = buildWireframeContext();
  _wireframeSnapshot = buildWireframeSnapshot();
  const notes  = notesTA.value.trim();

  const svgCounts = elements
    .filter(e => e.type === 'svg')
    .reduce((acc, el) => {
      const key = el.svgName || 'SVG';
      acc[key] = (acc[key] || 0) + 1;
      return acc;
    }, {});
  const componentList = Object.keys(svgCounts).length
    ? `\n\nComponents on the canvas (ALL instances must appear in the generated code):\n${Object.entries(svgCounts).map(([name, count]) => `• ${name} ×${count}`).join('\n')}`
    : '';
  const notesBlock = notes ? `\n\nDesigner notes:\n${notes}` : '';

  const prompt =
    `Here is my wireframe. The attached image is the primary source of truth for layout.\n\n` +
    `Text description:\n${wfText}${componentList}${notesBlock}\n\n` +
    `Generate the full Carbon Design System React code now. No questions — make reasonable assumptions.`;

  sendToOpenAI(prompt);
});

// ============================================================
//  TOAST
// ============================================================
let toastTimer = null;
function showToast(msg) {
  toast.textContent = msg; toast.classList.add('show');
  clearTimeout(toastTimer); toastTimer = setTimeout(() => toast.classList.remove('show'), 2000);
}

// ============================================================
//  DOWNLOAD AS SELF-CONTAINED HTML
// ============================================================
document.getElementById('download-btn').addEventListener('click', () => {
  const seed = {
    elements:   elements,
    notes:      notesTA.value,
    camera:     camera,
    svgLibrary: svgLibrary,
  };

  // Inject seed data into a copy of the page HTML
  const seedScript =
    `<script>window.__WIREFRAME_SEED__=${JSON.stringify(seed)};<\/script>`;
  const source   = document.documentElement.outerHTML;
  const injected = source.replace('</head>', seedScript + '\n</head>');

  const blob = new Blob(['<!DOCTYPE html>\n' + injected], { type: 'text/html' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = 'wireframe-' + new Date().toISOString().slice(0, 10) + '.html';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);

  showToast('Downloaded!');
});

// ============================================================
//  INIT  —  restore from seed if present (downloaded file)
// ============================================================
if (window.__WIREFRAME_SEED__) {
  const seed = window.__WIREFRAME_SEED__;
  elements   = seed.elements   || [];
  camera     = seed.camera     || camera;
  svgLibrary = seed.svgLibrary || [];

  // Keep idCounter above any existing IDs to avoid collisions
  [...elements, ...svgLibrary].forEach(item => {
    const n = parseInt((item.id || '').replace(/^\D+/, ''), 10);
    if (n > idCounter) idCounter = n;
  });

  ensureSizeDefaults();

  // Restore _typeCounts from saved element names
  for (const el of elements) {
    const m = (el.name || '').match(/^(Row Frame|Column Frame|Frame|Circle|Shape)\s+(\d+)$/);
    if (m) {
      const t = m[1] === 'Row Frame' ? 'rect'
              : m[1] === 'Column Frame' ? 'col-rect'
              : m[1] === 'Frame' ? 'frame'
              : m[1].toLowerCase();
      const n = parseInt(m[2], 10);
      if (n > (_typeCounts[t] || 0)) _typeCounts[t] = n;
    }
  }

  notesTA.value = seed.notes || '';
  if (svgLibrary.length) renderLibrary();
}
render();
</script>
</body>
